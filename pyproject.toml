[project]
name = "new-ime"
version = "0.2.0"
description = "Japanese kana-kanji IME research prototype (v2 restructure)"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.5",
    "pydantic>=2.6",
    "tokenizers>=0.19",
    "numpy>=1.26",
    "tqdm>=4.66",
    "jaconv>=0.3",
    "tomli>=2.0;python_version<'3.11'",
]

[project.scripts]
ime-train = "new_ime.cli.train:main"
ime-bench = "new_ime.cli.bench:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/new_ime"]

[tool.hatch.metadata]
allow-direct-references = true
