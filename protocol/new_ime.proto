syntax = "proto3";
package newime;
option optimize_for = LITE_RUNTIME;

// ---- Request ----

message RequestEnvelope {
    oneof payload {
        ConvertRequest convert = 1;
        ConvertIncrementalRequest convert_incremental = 2;
        SetContextRequest set_context = 3;
        ReloadModelRequest reload_model = 4;
        ShutdownRequest shutdown = 5;
    }
}

message ConvertRequest {
    string kana_input = 1;       // Hiragana input
    string left_context = 2;     // Left context (max 40 chars)
    int32 num_candidates = 3;    // Number of candidates (default 5)
    bool use_refinement = 4;     // Use Mask-CTC refinement
}

message ConvertIncrementalRequest {
    string kana_input = 1;
    string left_context = 2;
    string cached_prefix = 3;    // For encoder KV cache reuse
    int32 num_candidates = 4;
}

message SetContextRequest {
    string surrounding_text = 1;
    int32 cursor_position = 2;
}

message ReloadModelRequest {
    string model_path = 1;       // Empty = default path
}

message ShutdownRequest {}

// ---- Response ----

message ResponseEnvelope {
    enum Status {
        SUCCESS = 0;
        FAILED = 1;
    }
    Status status = 1;
    string error_message = 2;
    oneof payload {
        CandidatesResult candidates = 3;
        Empty empty = 4;
    }
}

message CandidatesResult {
    repeated Candidate candidates = 1;
}

message Candidate {
    string text = 1;             // Conversion result (kanji-kana mixed)
    string reading = 2;          // Reading (hiragana)
    float score = 3;             // Confidence score
}

message Empty {}
