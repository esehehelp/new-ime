model:
  preset: phase3_90m
  use_cvae: true
  max_kanji: 6000
  max_seq_len: 128

training:
  batch_size: 8
  eval_batch_size: 8
  grad_accum: 4
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  kl_weight: 0.05
  fp16: true
  warmup_steps: 2000
  checkpoint_every: 2000
  eval_every: 2000
  log_every: 100

data:
  train: datasets/eval/general/train.jsonl
  dev: datasets/eval/general/dev.jsonl
  max_train_samples: 0
  max_dev_samples: 2000

debug:
  tiny_overfit_samples: 0
  tiny_overfit_eval_train: false
  print_samples: 3
