# Suiko-v1-small + beam5 + KenLM MoE.
# general / tech are 6-gram q8; entity stays 4-gram because a 6-gram
# entity LM is not generated.
#
# Requires kenlm Python binding -> WSL only.

[run]
name = "suiko-v1-small-kenlm-6gram-q8-moe"
out_dir = "results/bench/suiko-v1-small-kenlm-6gram-q8-moe"

[model]
type = "ctc-nat"
checkpoint = "checkpoints/suiko-v1-small/checkpoint_step_100000.pt"
tokenizer  = "checkpoints/suiko-v1-small/checkpoint_step_100000_tokenizer.json"
preset = "phase3_30m"

[decode]
mode = "beam"
num_beams = 5
num_return = 5
top_k = 5

[benches]
probe_v3    = "datasets/eval/probe/probe.json"
ajimee_jwtd = "references/AJIMEE-Bench/JWTD_v2/v1/evaluation_items.json"

[device]
backend = "cpu"

[lm]
mode = "moe"
alpha = 0.2
beta = 0.6

[lm.paths_by_domain]
general = "assets/kenlm/kenlm_general_6gram_q8.bin"
tech    = "assets/kenlm/kenlm_tech_6gram_q8.bin"
entity  = "assets/kenlm/kenlm_entity_4gram.bin"
