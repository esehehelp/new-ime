# jinen-v1-xsmall (35.8M)。canonical 比較対象。
# anchor (benchmark_comparison.md 2026-04-22):
#   probe_v3:    EM1=0.609 EM5=0.747 CharAcc=0.929 p50=115ms (n=348)
#   ajimee_jwtd: EM1=0.395 EM5=0.525 CharAcc=0.917 p50=124ms (n=200)
# path は HF Hub ID。初回は HF Hub から download される。

[run]
name = "jinen-v1-xsmall"
out_dir = "results/bench/jinen-v1-xsmall"

[model]
type = "jinen-v1"
path = "togatogah/jinen-v1-xsmall"

[decode]
mode = "beam"
num_beams = 5
num_return = 5
top_k = 5

[benches]
probe_v3    = "datasets/eval/probe/probe.json"
ajimee_jwtd = "references/AJIMEE-Bench/JWTD_v2/v1/evaluation_items.json"

[device]
backend = "cpu"
