# Suiko-v1-small + beam5 + single-LM KenLM shallow fusion.
# Canonical decode condition (num_beams=5, num_return=5).
#
# Past benchmark_comparison.md anchor:
#   probe_v3:    EM1=0.664 EM5=0.776 CharAcc=0.947 p50=17ms (n=348)
#   ajimee_jwtd: EM1=0.670 EM5=0.830 CharAcc=0.959 p50=21ms (n=200)
#
# Requires kenlm Python binding -> WSL only (Windows native build of
# kenlm is broken in setuptools as of 0.3.0).

[run]
name = "suiko-v1-small-kenlm"
out_dir = "results/bench/suiko-v1-small-kenlm"

[model]
type = "ctc-nat"
onnx = "models/onnx/suiko-v1-small-step100000.int8.onnx"

[decode]
mode = "beam"
num_beams = 5
num_return = 5
top_k = 5

[benches]
probe_v3    = "datasets/eval/probe/probe.json"
ajimee_jwtd = "references/AJIMEE-Bench/JWTD_v2/v1/evaluation_items.json"

[device]
backend = "cpu"

[lm]
mode = "single"
path = "assets/kenlm/kenlm_general_train_4gram_probing.bin"
alpha = 0.2
beta = 0.6
