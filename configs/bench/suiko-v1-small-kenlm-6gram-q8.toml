# Suiko-v1-small + beam5 + single-LM KenLM 6-gram (q8 trie, 8-bit quantized).
# Same model as suiko-v1-small-kenlm-6gram but trie+q8 storage to compare
# size/speed trade-off vs probing.
#
# Requires kenlm Python binding -> WSL only.

[run]
name = "suiko-v1-small-kenlm-6gram-q8"
out_dir = "results/bench/suiko-v1-small-kenlm-6gram-q8"

[model]
type = "ctc-nat"
onnx = "models/onnx/suiko-v1-small-step100000.int8.onnx"

[decode]
mode = "beam"
num_beams = 5
num_return = 5
top_k = 5

[benches]
probe_v3    = "datasets/eval/probe/probe.json"
ajimee_jwtd = "references/AJIMEE-Bench/JWTD_v2/v1/evaluation_items.json"

[device]
backend = "cpu"

[lm]
mode = "single"
path = "assets/kenlm/kenlm_general_6gram_q8.bin"
alpha = 0.2
beta = 0.6
