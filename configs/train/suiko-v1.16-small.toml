# Suiko-v1.16-small: config-only quick wins (no code changes).
#
# v1.15c baseline (no-KD + refine 0.0 + iter 1) からの脱却第一歩。
# Phase 1 全 levers のうち、code 変更不要な 4 つを集約:
#   - α: refine.loss_weight 0.0 → 0.3 (refine head を training-aux として復活)
#   - 1: KD self-distill (teacher = v1.13-small/best.pt)
#   - 2/θ: refine.refine_iterations 1 → 3 (Mask-CTC 論文標準)
#   - 3: cosine_warm_restarts で max_steps 100k → 80k (longer + 1 restart)
#
# 残り Phase 1 levers (β deep-sup, γ GLAT, δ refine→proposal distill,
# ε dropout, ζ stop per-pos, η calibration) は code 変更を伴うため別 config
# (suiko-v2.0-small.toml) で重ね掛け予定。本 config は config-only の効果を
# 単独計測する baseline 兼、即訓練可能な v1 系列の最新形。
#
# v1.15c step 44171 から resume:
#   - 既存 ~44k step の収束を活用、teacher v1.13 と weight 共有も embedding
#     tying 経由で初期 KL 損失低い
#   - reset_scheduler=true で cosine_warm_restarts の初期 warmup を新たに踏む
#
# 中断再開: kill switch (touch STOP) で安全停止。 [resume] 張替で再開。

[run]
name = "suiko-v1.16-small"
seed = 60
out_dir = "checkpoints/suiko-v1.16-small"

[resume]
checkpoint = "checkpoints/suiko-v1.15c-small/checkpoint_step_44171.pt"
reset_optimizer = false
reset_scheduler = true
reset_best_metric = true

[model]
preset = "phase3_30m"
max_seq_len = 128
max_context = 32
use_cvae = false
arch = "ctc-nat"

[data]
train     = "datasets/mixes/student-v1.13-500m.kkc"
dev       = "datasets/eval/general/dev.jsonl"
tokenizer = "datasets/tokenizers/char-jis-24k.json"
max_train_samples = 0
max_dev_samples   = 1000

[optim]
lr = 3e-4
warmup_steps = 2000
schedule = "cosine_warm_restarts"
lr_min_ratio = 0.05
weight_decay = 0.01
grad_clip = 1.0
# Restart 周期 60k step (Phase 1 想定の 80k 走中で 1 回 restart)、
# decay 0.85 で 2 回目 peak は 0.85x。
lr_restart_period = 60000
lr_restart_decay = 0.85

[loop]
batch_size = 64
eval_batch_size = 64
grad_accum = 2
max_steps = 80000
fp16 = true
bf16 = false
compile = false
num_workers = 0
warmup_short_sample_steps = 0
short_sample_max_chars = 16
tiny_overfit_samples = 0

[logging]
log_every = 500
eval_every = 4000
checkpoint_every = 10000
keep_last_k = 5
print_samples = 3

[probe]
path = "datasets/eval/probe/probe.json"
every = 5000
limit = 0
metric_priority = "probe_em1"

[refine]
# α: 0.0 → 0.3 で refine head を training-aux 復活。inference は引き続き
# refiner=false (推論レイテンシ影響ゼロ)。
loss_weight = 0.3
warmup_steps = 3000
mask_ratio_min = 0.15
mask_ratio_max = 0.35
# 2/θ: 1 → 3 で Mask-CTC 論文標準回数。training cost +30-50%、
# refine 質向上で encoder 勾配シグナル強化。
refine_iterations = 3
refine_source = "target"
remask_loss_weight = 0.1
stop_loss_weight = 0.1

[kd]
# 1: KD self-distill。teacher = v1.13 best.pt (CTC arch、同 vocab、
# 同 preset)、self-distill 想定で +1-3pt EM1 期待。
teacher_type = "ctc"
teacher_path = "checkpoints/suiko-v1.13-small/best.pt"
alpha = 0.3
alpha_final = 0.1
warmup_steps = 3000
alpha_decay_start = 30000
alpha_decay_steps = 30000
gate_mode = "all"
temperature = 1.5
