# mizuho: experimental Suiko run on the Kotodama mix.
#
# Lowercase / version-less name = not yet a published "Suiko-vN-small";
# promotes to Suiko-v2-small only when greedy probe_v3 EM1 > 0.65.
#
# Mix delta (vs Hibiki):
#   - synth pool ratio 0.10 → 0.15
#   - synth pool gains datasets/corpus/synth/mozc_homophone.jsonl
#     (393k reading→surface pairs over 123k homophone groups, mozc OSS)
#
# Targets (after 50k step on 3060):
#   greedy probe_v3 EM1 >= 0.65 (= promotion bar)
#   per-category homophone EM1 >= 0.55 (vs 0.487 zenz/Suiko-v1 floor)
#
# Past trace anchor (same hardware, same tokenizer):
#   step 50k: CharAcc ≈ 0.885 / blank ≈ 0.49 / rate ≈ 2.4 step/s

[run]
name = "mizuho"
seed = 70
out_dir = "checkpoints/mizuho"

[model]
preset = "phase3_30m"
max_seq_len = 128
max_context = 32

[data]
train     = "datasets/mixes/Kotodama.jsonl"
dev       = "datasets/eval/general/dev.jsonl"
tokenizer = "datasets/tokenizers/char-5k.json"
# 2M reservoir: 50k step × eff_batch 128 = 6.4M samples processed,
# ~3.2x repetition per sample. Keeps RAM ~ 600 MB while still letting
# every (reading, surface) pair land in the loop a few times.
max_train_samples = 2000000
max_dev_samples   = 2000

[optim]
lr = 4e-4
warmup_steps = 2000
schedule = "cosine"
lr_min_ratio = 0.10
weight_decay = 0.01
grad_clip = 1.0

[loop]
batch_size = 64
eval_batch_size = 64
grad_accum = 2
max_steps = 50000
fp16 = true
bf16 = false
compile = true
num_workers = 0

[logging]
log_every = 500
eval_every = 1000
checkpoint_every = 5000
keep_last_k = 3
print_samples = 3
early_log_every = 10
early_log_steps = 200

[probe]
path = "datasets/eval/probe/probe.json"
every = 5000
limit = 0
metric_priority = "probe_em1"

[refine]
loss_weight = 0.7
warmup_steps = 5000
mask_ratio_min = 0.15
mask_ratio_max = 0.35
refine_source = "target"
remask_loss_weight = 0.1
stop_loss_weight = 0.1
