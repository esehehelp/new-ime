# v2.5-baseline. CTC + refine + AR teacher KD (when teacher checkpoint
# available). Target: 50k step on 3060, char-5k tokenizer + 100M low-bunsetsu
# JSONL mix.
#
# Past trace anchor (8cdf0df era, same hardware, same tokenizer):
#   step 50k → CharAcc ≈ 0.885, EM ≈ 0.344, blank ≈ 0.49, rate ≈ 2.4 step/s
#
# v2.5-baseline target: meet or beat those numbers.

[run]
name = "v2.5-baseline"
seed = 70
out_dir = "checkpoints/v2.5-baseline"

[model]
preset = "phase3_30m"
max_seq_len = 128
max_context = 32

[data]
train     = "datasets/mixes/student-v2.5-100m-lowbunsetsu.jsonl"
dev       = "datasets/eval/general/dev.jsonl"
tokenizer = "datasets/tokenizers/char-5k.json"
# Reservoir-cap RAM at 2M rows so the loader fits in memory; epochs cycle
# through the same 2M sample for the duration of training (~16 epochs at
# eff_batch=128 over 50k steps).
max_train_samples = 2000000
max_dev_samples   = 2000

[optim]
lr = 4e-4
warmup_steps = 2000
schedule = "cosine"
lr_min_ratio = 0.10
weight_decay = 0.01
grad_clip = 1.0

[loop]
batch_size = 64
eval_batch_size = 64
grad_accum = 2
max_steps = 50000
fp16 = true
bf16 = false
compile = true
num_workers = 0

[logging]
log_every = 500
eval_every = 1000
checkpoint_every = 5000
keep_last_k = 3
print_samples = 3
early_log_every = 10
early_log_steps = 200

[probe]
path = "datasets/eval/probe/probe.json"
every = 5000
limit = 0
metric_priority = "probe_em1"

[refine]
loss_weight = 0.7
warmup_steps = 5000
mask_ratio_min = 0.15
mask_ratio_max = 0.35
refine_source = "target"
remask_loss_weight = 0.1
stop_loss_weight = 0.1

