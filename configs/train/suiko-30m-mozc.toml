# Suiko-30m-mozc: CTC-NAT 30M trained on student-v2.6-100m-mozc mix.
#
# Mix differential (vs v2.5 lowbunsetsu):
#   - synth ratio 0.10 → 0.15
#   - synth pool now includes datasets/corpus/synth/mozc_homophone.jsonl
#     (393k reading→surface pairs over 123k homophone groups, mozc OSS)
#
# Goal: lift probe_v3 homophone EM1 (0.487 baseline = same as zenz-v3.1-small,
# so the gap is data-side not capacity-side) without regressing other
# categories. After-train bench target = greedy >= 0.59, +KenLM-MoE >= 0.65
# overall, with homophone column >= 0.55 (vs 0.487 baseline).
#
# Past trace anchor (8cdf0df era, same hardware, same tokenizer):
#   step 50k: CharAcc ≈ 0.885 / blank ≈ 0.49 / rate ≈ 2.4 step/s

[run]
name = "suiko-30m-mozc"
seed = 70
out_dir = "checkpoints/suiko-30m-mozc"

[model]
preset = "phase3_30m"
max_seq_len = 128
max_context = 32

[data]
train     = "datasets/mixes/student-v2.6-100m-mozc.jsonl"
dev       = "datasets/eval/general/dev.jsonl"
tokenizer = "datasets/tokenizers/char-5k.json"
# 2M reservoir: 50k step × eff_batch 128 = 6.4M samples processed,
# ~3.2x repetition per sample. Keeps RAM ~ 600 MB while still letting
# every (reading, surface) pair land in the loop a few times.
max_train_samples = 2000000
max_dev_samples   = 2000

[optim]
lr = 4e-4
warmup_steps = 2000
schedule = "cosine"
lr_min_ratio = 0.10
weight_decay = 0.01
grad_clip = 1.0

[loop]
batch_size = 64
eval_batch_size = 64
grad_accum = 2
max_steps = 50000
fp16 = true
bf16 = false
compile = true
num_workers = 0

[logging]
log_every = 500
eval_every = 1000
checkpoint_every = 5000
keep_last_k = 3
print_samples = 3
early_log_every = 10
early_log_steps = 200

[probe]
path = "datasets/eval/probe/probe.json"
every = 5000
limit = 0
metric_priority = "probe_em1"

[refine]
loss_weight = 0.7
warmup_steps = 5000
mask_ratio_min = 0.15
mask_ratio_max = 0.35
refine_source = "target"
remask_loss_weight = 0.1
stop_loss_weight = 0.1
