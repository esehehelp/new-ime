# Suiko-v1.13-small: 30M ctc-nat、KD なし、refine 3 部 loss あり。
# v2 training loop 再実装後の最初の本走 target。
# ハイパラは suiko-v1-reproduce.toml をベースに、v2 の追加項目
# (refine_iterations / remask_loss_weight / stop_loss_weight 等) を
# 明示。compile は torch.compile 経由で有効化する。
#
# 本走は GPU host (vast.ai 5090 等) を想定。local CPU では smoke 用
# の suiko-v1.13-small.smoke.toml で動作確認のみ。
# 中断再開する場合は下の [resume] をコメント解除し、checkpoint を
# 直近の checkpoint_step_*.pt に向ける。max_steps は「最終到達 step」。

[run]
name = "suiko-v1.13-small"
seed = 52
out_dir = "checkpoints/suiko-v1.13-small"

# [resume]
# checkpoint = "checkpoints/suiko-v1.13-small/checkpoint_step_10000.pt"
# reset_optimizer = false
# reset_scheduler = false
# reset_best_metric = false

[model]
preset = "phase3_30m"
max_seq_len = 128
max_context = 32
use_cvae = false
arch = "ctc-nat"

[data]
train     = "datasets/mixes/student-v1.13-500m.kkc"
dev       = "datasets/eval/general/dev.jsonl"
tokenizer = "datasets/tokenizers/char-jis-24k.json"
max_train_samples = 0
max_dev_samples   = 2000

[optim]
lr = 4e-4
warmup_steps = 2000
schedule = "cosine"
lr_min_ratio = 0.10
weight_decay = 0.01
grad_clip = 1.0

[loop]
batch_size = 64
eval_batch_size = 64
grad_accum = 2
max_steps = 100000
fp16 = false
bf16 = true
compile = true
num_workers = 0
warmup_short_sample_steps = 0
short_sample_max_chars = 16
tiny_overfit_samples = 0

[logging]
log_every = 500
eval_every = 1000
checkpoint_every = 10000
keep_last_k = 5
print_samples = 5

[probe]
path = "datasets/eval/probe/probe.json"
every = 10000
limit = 0
metric_priority = "probe_em1"

[refine]
loss_weight = 0.7
warmup_steps = 5000
mask_ratio_min = 0.15
mask_ratio_max = 0.35
refine_iterations = 1
refine_source = "target"
remask_loss_weight = 0.1
stop_loss_weight = 0.1
