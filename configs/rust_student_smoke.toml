[dataset]
train_shard = "datasets/mixes/student-20m.kkc"

[tokenizer]
path = "datasets/tokenizers/char-5k.json"
max_kanji = 6000
vocab_size = 4801

[model]
preset = "phase3_20m"

[runtime]
param_dtype_bytes = 4
grad_dtype_bytes = 4
adam_state_bytes = 8
activation_dtype_bytes = 4
prefetch_queue = 2

[eval]
batches = 0

[backend]
kind = "tch-ctc-nat"
optimizer = "adamw"
scheduler = "warmup_cosine"
learning_rate = 5e-4
init_scale = 0.02
weight_decay = 0.01
momentum = 0.9
beta1 = 0.9
beta2 = 0.999
epsilon = 1e-8
warmup_steps = 5
scheduler_total_steps = 100
min_lr_scale = 0.2
parameter_count = 1000000
hidden_size = 96
encoder_layers = 2
num_heads = 4
ffn_size = 256
decoder_layers = 2
decoder_heads = 4
decoder_ffn_size = 256
output_size = 4801
blank_id = 4
max_positions = 128
mask_token_id = 5
refine_loss_weight = 0.0
refine_warmup_steps = 0
refine_mask_ratio = 0.3
remask_loss_weight = 0.0
stop_loss_weight = 0.0

[train]
batch_size = 4
max_input_len = 128
max_target_len = 128
grad_accum = 1
block_rows = 128
seed = 1
checkpoint_keep_last = 2
